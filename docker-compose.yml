version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaultshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vaultshare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaultshare} -d ${POSTGRES_DB:-vaultshare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../vaultshare-api
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../vaultshare-api:/app
      - media_volume:/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-vaultshare}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vaultshare}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ../vaultshare-api
      dockerfile: Dockerfile
    command: >
      sh -c "celery -A config worker -l info"
    volumes:
      - ../vaultshare-api:/app
      - media_volume:/media
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-vaultshare}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vaultshare}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  celery-beat:
    build:
      context: ../vaultshare-api
      dockerfile: Dockerfile
    command: >
      sh -c "celery -A config beat -l info"
    volumes:
      - ../vaultshare-api:/app
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-vaultshare}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vaultshare}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../vaultshare-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../vaultshare-frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
  media_volume:
